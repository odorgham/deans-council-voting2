<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام التصويت على ترقيات أعضاء الهيئة التدريسية | مجلس العمداء - جامعة البلقاء التطبيقية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152420;
    --ink-soft:#3c5049;
    --paper:#F6F4EE;
    --paper-raised:#FFFFFF;
    --line: #DCD6C6;
    --deep-green:#1B4332;
    --deep-green-2:#0F2E22;
    --gold:#B4884C;
    --gold-soft:#E7D6B4;
    --accept:#2F6E4E;
    --accept-bg:#E4F0E7;
    --reject:#9A3B32;
    --reject-bg:#F5E6E3;
    --shadow: 0 10px 30px rgba(15,46,34,0.08);
    --radius: 14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans Arabic','Tajawal',sans-serif;
    min-height:100vh;
    line-height:1.6;
  }
  h1,h2,h3,.display{
    font-family:'Tajawal','IBM Plex Sans Arabic',sans-serif;
  }
  #app{min-height:100vh; display:flex; flex-direction:column;}

  /* ===== Top bar (seal stripe) ===== */
  .seal-stripe{
    height:6px;
    background: repeating-linear-gradient(90deg, var(--gold) 0 28px, var(--deep-green) 28px 56px);
  }
  .topbar{
    background:var(--deep-green);
    color:#fff;
    padding:16px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:14px;}
  .brand-mark{
    width:46px;height:46px;border-radius:50%;
    border:2px solid var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
    font-weight:900; font-size:18px; color:var(--gold-soft);
    font-family:'Tajawal',sans-serif;
    flex-shrink:0;
    background:#fff;
    overflow:hidden;
    padding:2px;
  }
  .brand-mark img{width:100%; height:100%; object-fit:cover; border-radius:50%;}
  .brand-text .t1{font-size:13px; color:var(--gold-soft); letter-spacing:.5px;}
  .brand-text .t2{font-size:19px; font-weight:700;}
  .who{display:flex; align-items:center; gap:12px; font-size:14px;}
  .who .name{font-weight:700;}
  .who .role-badge{
    background: rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    padding:3px 10px; border-radius:999px; font-size:12px;
  }
  .btn-ghost{
    background:transparent; border:1px solid rgba(255,255,255,0.35);
    color:#fff; padding:7px 14px; border-radius:8px; cursor:pointer;
    font-family:inherit; font-size:13px;
  }
  .btn-ghost:hover{background:rgba(255,255,255,0.1);}

  main{flex:1; width:100%; max-width:1100px; margin:0 auto; padding:28px 20px 60px;}

  /* ===== Login ===== */
  .login-wrap{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(180,136,76,0.12), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(27,67,50,0.10), transparent 45%),
      var(--paper);
    padding:24px;
  }
  .login-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow);
    width:100%; max-width:460px;
    overflow:hidden;
  }
  .login-head{
    background:var(--deep-green);
    color:#fff;
    padding:30px 30px 26px;
    text-align:center;
    position:relative;
  }
  .login-head::after{
    content:"";
    position:absolute; bottom:0; right:0; left:0; height:5px;
    background: repeating-linear-gradient(90deg, var(--gold) 0 20px, var(--deep-green-2) 20px 40px);
  }
  .login-head .uni-mark{
    width:74px;height:74px;border-radius:50%;
    border:2px solid var(--gold-soft); margin:0 auto 14px;
    display:flex;align-items:center;justify-content:center;
    font-weight:900; color:var(--gold-soft); font-size:22px;
    background:#fff; overflow:hidden; padding:3px;
  }
  .login-head .uni-mark img{width:100%; height:100%; object-fit:cover; border-radius:50%;}
  .login-head h1{font-size:19px; margin:0 0 6px; font-weight:700;}
  .login-head p{margin:0; font-size:13px; color:var(--gold-soft); opacity:.9;}
  .login-body{padding:28px 30px 30px;}
  .tabs{display:flex; border:1px solid var(--line); border-radius:10px; overflow:hidden; margin-bottom:22px;}
  .tab{
    flex:1; text-align:center; padding:10px; cursor:pointer;
    font-size:14px; font-weight:600; color:var(--ink-soft);
    background:var(--paper); transition:.15s;
  }
  .tab.active{background:var(--deep-green); color:#fff;}
  .field{margin-bottom:16px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:6px;}
  select, input[type=text], input[type=password], input[type=number], textarea{
    width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:9px;
    font-family:inherit; font-size:14px; background:#fff; color:var(--ink);
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--gold); outline-offset:1px; border-color:var(--gold);}
  .btn-primary{
    width:100%; padding:12px; border:none; border-radius:9px;
    background:var(--deep-green); color:#fff; font-weight:700; font-size:15px;
    cursor:pointer; font-family:inherit;
  }
  .btn-primary:hover{background:var(--deep-green-2);}
  .btn-primary:disabled{opacity:.5; cursor:not-allowed;}
  .err{color:var(--reject); font-size:13px; margin:-6px 0 14px; min-height:16px;}
  .hint{font-size:12px; color:var(--ink-soft); margin-top:14px; text-align:center; line-height:1.7;}

  /* ===== Section headers ===== */
  .page-title{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; flex-wrap:wrap; gap:10px;}
  .page-title h2{font-size:22px; margin:0;}
  .page-sub{color:var(--ink-soft); font-size:13.5px; margin:0 0 22px;}
  .nav-tabs{display:flex; gap:8px; margin-bottom:24px; border-bottom:1px solid var(--line); flex-wrap:wrap;}
  .nav-tab{
    padding:10px 16px; cursor:pointer; font-size:14px; font-weight:600;
    color:var(--ink-soft); border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .nav-tab.active{color:var(--deep-green); border-bottom-color:var(--gold);}

  /* ===== Stat strip ===== */
  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:26px;}
  .stat{background:var(--paper-raised); border:1px solid var(--line); border-radius:12px; padding:14px 16px;}
  .stat .n{font-size:24px; font-weight:900; color:var(--deep-green);}
  .stat .l{font-size:12.5px; color:var(--ink-soft);}

  /* ===== Case card ===== */
  .case-list{display:flex; flex-direction:column; gap:16px;}
  .case-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px 22px; box-shadow:var(--shadow);
  }
  .case-top{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;}
  .case-name{font-size:17px; font-weight:700; margin:0 0 4px;}
  .case-meta{font-size:13px; color:var(--ink-soft); display:flex; gap:14px; flex-wrap:wrap;}
  .rank-chip{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--gold-soft); color:#5c4423; padding:5px 12px; border-radius:999px;
    font-size:12.5px; font-weight:700; white-space:nowrap;
  }
  .status-pill{
    padding:4px 11px; border-radius:999px; font-size:11.5px; font-weight:700;
  }
  .status-open{background:#EAF2EE; color:var(--accept);}
  .status-closed{background:#EFEDE6; color:#7a7563;}
  .vote-row{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
  .vote-btn{
    flex:1; min-width:130px; padding:12px; border-radius:10px; cursor:pointer;
    font-family:inherit; font-weight:700; font-size:14px; border:2px solid var(--line);
    background:#fff; color:var(--ink); transition:.15s;
  }
  .vote-btn.accept.selected{background:var(--accept-bg); border-color:var(--accept); color:var(--accept);}
  .vote-btn.reject.selected{background:var(--reject-bg); border-color:var(--reject); color:var(--reject);}
  .vote-btn:hover:not(:disabled){border-color:var(--ink-soft);}
  .vote-btn:disabled{opacity:.55; cursor:not-allowed;}
  .voted-note{font-size:12.5px; color:var(--ink-soft); margin-top:10px;}
  .voted-note b{color:var(--ink);}

  .empty{
    text-align:center; padding:60px 20px; color:var(--ink-soft);
    background:var(--paper-raised); border:1px dashed var(--line); border-radius:var(--radius);
  }

  /* ===== Admin ===== */
  .panel{background:var(--paper-raised); border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); margin-bottom:20px;}
  .panel h3{margin:0 0 16px; font-size:16px;}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media(max-width:640px){.grid-2{grid-template-columns:1fr;}}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th,td{padding:10px 8px; text-align:right; border-bottom:1px solid var(--line);}
  th{color:var(--ink-soft); font-weight:600; font-size:12.5px;}
  .row-actions{display:flex; gap:8px;}
  .icon-btn{
    border:1px solid var(--line); background:#fff; border-radius:7px; padding:5px 10px;
    cursor:pointer; font-size:12px; font-family:inherit; color:var(--ink-soft);
  }
  .icon-btn.danger{color:var(--reject); border-color:#e6c9c5;}
  .icon-btn:hover{background:var(--paper);}
  .add-form{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-top:14px;}
  .add-form .field{flex:1; min-width:140px; margin-bottom:0;}
  .btn-small{padding:10px 18px; border:none; border-radius:9px; background:var(--deep-green); color:#fff; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit; white-space:nowrap;}
  .btn-small:hover{background:var(--deep-green-2);}
  .result-bar{height:10px; border-radius:6px; background:var(--reject-bg); overflow:hidden; margin:8px 0;}
  .result-fill{height:100%; background:var(--accept);}
  .result-nums{display:flex; justify-content:space-between; font-size:12.5px; color:var(--ink-soft);}
  .not-voted{font-size:12px; color:var(--ink-soft); margin-top:8px;}

  .loading-screen{display:flex; align-items:center; justify-content:center; min-height:100vh; color:var(--ink-soft); font-size:14px;}
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--deep-green); color:#fff; padding:11px 22px; border-radius:9px;
    font-size:13.5px; box-shadow:var(--shadow); z-index:50; opacity:0; transition:.25s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}

  @media print{
    .topbar,.nav-tabs,.btn-ghost,.no-print{display:none !important;}
    body{background:#fff;}
  }
</style>
</head>

  /* ---------------- Firestore helpers ---------------- */

  function uid(prefix){ return prefix + "_" + Math.random().toString(36).slice(2,9); }

  function defaultData(){
    return {
      adminPin: "1234",
      members: [
        {id: uid("m"), name:"عميد كلية الهندسة", college:"كلية الهندسة التكنولوجية", pin:"1111"},
        {id: uid("m"), name:"عميد كلية العلوم", college:"كلية العلوم", pin:"2222"},
        {id: uid("m"), name:"عميد كلية الأعمال", college:"كلية الأعمال", pin:"3333"}
      ],
      cases: []
    };
  }

  let DATA = null;
  let VOTES = null;
  let session = null; // {type:'member', memberId} or {type:'admin'}
  let adminTab = "cases"; // cases | members | results
  let loginTab = "member";
  let loginError = "";

  function safeRerenderFromSnapshot(){
    const el = document.activeElement;
    const tag = el && el.tagName;
    if(tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return; // don't disrupt typing
    if(document.hidden) return;
    render();
  }

  async function loadAll(){
    try{
      const dataSnap = await getDoc(dataDocRef);
      if(dataSnap.exists()){ DATA = dataSnap.data(); }
      else { DATA = defaultData(); await setDoc(dataDocRef, DATA); }
    }catch(e){ console.error("Firestore load (data) failed", e); DATA = defaultData(); }

    try{
      const votesSnap = await getDoc(votesDocRef);
      if(votesSnap.exists()){ VOTES = votesSnap.data(); }
      else { VOTES = {}; await setDoc(votesDocRef, VOTES); }
    }catch(e){ console.error("Firestore load (votes) failed", e); VOTES = {}; }

    // Live sync: reflect changes made by other devices/users in real time.
    onSnapshot(dataDocRef, (snap)=>{
      if(snap.exists()){ DATA = snap.data(); safeRerenderFromSnapshot(); }
    }, (err)=>console.error("data listener error", err));
    onSnapshot(votesDocRef, (snap)=>{
      if(snap.exists()){ VOTES = snap.data(); safeRerenderFromSnapshot(); }
    }, (err)=>console.error("votes listener error", err));
  }
  async function saveData(){
    try{ await setDoc(dataDocRef, DATA); }
    catch(e){ console.error("Firestore save (data) failed", e); showToast("تعذر الحفظ، تحقق من الاتصال بالإنترنت"); }
  }
  async function saveVotes(){
    try{ await setDoc(votesDocRef, VOTES); }
    catch(e){ console.error("Firestore save (votes) failed", e); showToast("تعذر حفظ التصويت، تحقق من الاتصال بالإنترنت"); }
  }

  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(()=> t.classList.remove("show"), 2200);
  }

  function esc(s){
    return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  /* ---------------- Render root ---------------- */
  function render(){
    const app = document.getElementById("app");
    if(!session){
      app.innerHTML = renderLogin();
      bindLogin();
      return;
    }
    if(session.type === "admin"){
      app.innerHTML = renderShell(renderAdmin(), true);
    } else {
      app.innerHTML = renderShell(renderMemberDashboard(), false);
    }
    bindShell();
  }

  /* ---------------- Login ---------------- */
  function renderLogin(){
    const memberOptions = DATA.members.map(m =>
      `<option value="${m.id}">${esc(m.name)} — ${esc(m.college)}</option>`).join("");

    return `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-head">
          <div class="uni-mark"><img src="${LOGO_DATA_URI}" alt="شعار جامعة البلقاء التطبيقية"></div>
          <h1>جامعة البلقاء التطبيقية</h1>
          <p>نظام التصويت الإلكتروني لمجلس العمداء — ترقيات أعضاء الهيئة التدريسية</p>
        </div>
        <div class="login-body">
          <div class="tabs">
            <div class="tab ${loginTab==='member'?'active':''}" data-tab="member">عضو مجلس العمداء</div>
            <div class="tab ${loginTab==='admin'?'active':''}" data-tab="admin">أمين المجلس / المسؤول</div>
          </div>

          ${loginTab === 'member' ? `
            <form id="loginForm">
              <div class="field">
                <label>اختر اسمك</label>
                <select id="memberSelect" ${DATA.members.length===0?'disabled':''}>
                  ${DATA.members.length ? memberOptions : '<option>لا يوجد أعضاء مضافون بعد</option>'}
                </select>
              </div>
              <div class="field">
                <label>الرمز السري</label>
                <input type="password" id="memberPin" placeholder="أدخل الرمز السري الخاص بك" autocomplete="off">
              </div>
              <div class="err">${esc(loginError)}</div>
              <button class="btn-primary" type="submit" ${DATA.members.length===0?'disabled':''}>دخول</button>
            </form>
          ` : `
            <form id="adminLoginForm">
              <div class="field">
                <label>رمز الدخول الخاص بالمسؤول</label>
                <input type="password" id="adminPinInput" placeholder="أدخل رمز المسؤول" autocomplete="off">
              </div>
              <div class="err">${esc(loginError)}</div>
              <button class="btn-primary" type="submit">دخول كمسؤول للنظام</button>
            </form>
          `}
          <p class="hint">هذا النظام مخصص للاستخدام الداخلي من قبل مجلس العمداء فقط.<br>لأي استفسار حول الرمز السري يرجى مراجعة أمين المجلس.</p>
        </div>
      </div>
    </div>`;
  }

  function bindLogin(){
    document.querySelectorAll(".tab").forEach(t=>{
      t.addEventListener("click", ()=>{ loginTab = t.dataset.tab; loginError=""; render(); });
    });
    const lf = document.getElementById("loginForm");
    if(lf) lf.addEventListener("submit", (e)=>{
      e.preventDefault();
      const id = document.getElementById("memberSelect").value;
      const pin = document.getElementById("memberPin").value.trim();
      const m = DATA.members.find(x=>x.id===id);
      if(!m){ loginError="الرجاء اختيار اسم صحيح."; render(); return; }
      if(pin !== m.pin){ loginError="الرمز السري غير صحيح."; render(); return; }
      loginError="";
      session = {type:"member", memberId: m.id};
      render();
    });
    const af = document.getElementById("adminLoginForm");
    if(af) af.addEventListener("submit", (e)=>{
      e.preventDefault();
      const pin = document.getElementById("adminPinInput").value.trim();
      if(pin !== DATA.adminPin){ loginError="رمز المسؤول غير صحيح."; render(); return; }
      loginError="";
      session = {type:"admin"};
      adminTab = "cases";
      render();
    });
  }

  /* ---------------- Shared shell ---------------- */
  function renderShell(inner, isAdmin){
    const who = isAdmin ? "أمين مجلس العمداء" : (DATA.members.find(m=>m.id===session.memberId)?.name || "");
    const roleLabel = isAdmin ? "مسؤول النظام" : "عضو مجلس العمداء";
    return `
    <div class="seal-stripe"></div>
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark"><img src="${LOGO_DATA_URI}" alt="شعار جامعة البلقاء التطبيقية"></div>
        <div class="brand-text">
          <div class="t1">جامعة البلقاء التطبيقية</div>
          <div class="t2">نظام التصويت على الترقيات — مجلس العمداء</div>
        </div>
      </div>
      <div class="who">
        <span class="name">${esc(who)}</span>
        <span class="role-badge">${esc(roleLabel)}</span>
        <button class="btn-ghost" id="logoutBtn">تسجيل الخروج</button>
      </div>
    </div>
    <main>${inner}</main>`;
  }

  function bindShell(){
    document.getElementById("logoutBtn").addEventListener("click", ()=>{
      session = null; render();
    });
    if(session && session.type === "admin"){
      document.querySelectorAll(".nav-tab").forEach(t=>{
        t.addEventListener("click", ()=>{ adminTab = t.dataset.tab; render(); });
      });
      bindAdminEvents();
    } else if(session){
      bindMemberEvents();
    }
  }

  /* ---------------- Member dashboard ---------------- */
  function renderMemberDashboard(){
    const openCases = DATA.cases.filter(c=>c.status==="open");
    const closedCases = DATA.cases.filter(c=>c.status==="closed");
    const votedCount = openCases.filter(c => VOTES[c.id] && VOTES[c.id][session.memberId]).length;

    const casesHtml = openCases.length ? openCases.map(c => caseCardHtml(c)).join("") :
      `<div class="empty">لا توجد ترقيات مطروحة للتصويت حالياً.</div>`;

    const closedHtml = closedCases.length ? `
      <div class="page-title" style="margin-top:34px;"><h2 style="font-size:18px;">ترقيات تم إغلاق التصويت عليها</h2></div>
      <div class="case-list">${closedCases.map(c=>caseCardHtml(c)).join("")}</div>
    ` : "";

    return `
      <div class="page-title"><h2>الترقيات المطروحة للتصويت</h2></div>
      <p class="page-sub">اطّلع على تفاصيل كل ترقية وقم بالتصويت عليها بشكل مستقل (قبول أو عدم قبول).</p>
      <div class="stats">
        <div class="stat"><div class="n">${openCases.length}</div><div class="l">ترقيات مفتوحة للتصويت</div></div>
        <div class="stat"><div class="n">${votedCount}</div><div class="l">صوّتَ عليها العضو</div></div>
        <div class="stat"><div class="n">${openCases.length - votedCount}</div><div class="l">بانتظار التصويت</div></div>
      </div>
      <div class="case-list">${casesHtml}</div>
      ${closedHtml}
    `;
  }

  function caseCardHtml(c){
    const myVote = (VOTES[c.id] && VOTES[c.id][session.memberId]) || null;
    const isOpen = c.status === "open";
    return `
    <div class="case-card">
      <div class="case-top">
        <div>
          <p class="case-name">${esc(c.facultyName)}</p>
          <div class="case-meta">
            <span>${esc(c.college)}</span>
            <span>${esc(c.department)}</span>
          </div>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          <span class="rank-chip">${esc(c.currentRank)} ← ${esc(c.targetRank)}</span>
          <span class="status-pill ${isOpen?'status-open':'status-closed'}">${isOpen?'مفتوح':'مغلق'}</span>
        </div>
      </div>
      <div class="vote-row">
        <button class="vote-btn accept ${myVote==='accept'?'selected':''}" data-case="${c.id}" data-vote="accept" ${!isOpen?'disabled':''}>✓ الموافقة على الترقية</button>
        <button class="vote-btn reject ${myVote==='reject'?'selected':''}" data-case="${c.id}" data-vote="reject" ${!isOpen?'disabled':''}>✕ عدم الموافقة</button>
      </div>
      ${myVote ? `<div class="voted-note">تصويتك المسجّل: <b>${myVote==='accept'?'الموافقة':'عدم الموافقة'}</b> — يمكنك تعديله ما دام التصويت مفتوحاً.</div>` : `<div class="voted-note">لم تصوّت على هذه الترقية بعد.</div>`}
    </div>`;
  }

  function bindMemberEvents(){
    document.querySelectorAll(".vote-btn").forEach(b=>{
      b.addEventListener("click", async ()=>{
        if(b.disabled) return;
        const caseId = b.dataset.case;
        const vote = b.dataset.vote;
        if(!VOTES[caseId]) VOTES[caseId] = {};
        VOTES[caseId][session.memberId] = vote;
        await saveVotes();
        showToast("تم تسجيل تصويتك بنجاح");
        render();
      });
    });
  }

  /* ---------------- Admin ---------------- */
  function renderAdmin(){
    const tabsHtml = `
      <div class="nav-tabs">
        <div class="nav-tab ${adminTab==='cases'?'active':''}" data-tab="cases">إدارة الترقيات</div>
        <div class="nav-tab ${adminTab==='members'?'active':''}" data-tab="members">أعضاء المجلس</div>
        <div class="nav-tab ${adminTab==='results'?'active':''}" data-tab="results">النتائج</div>
      </div>`;
    let body = "";
    if(adminTab === "cases") body = renderAdminCases();
    else if(adminTab === "members") body = renderAdminMembers();
    else body = renderAdminResults();
    return `<div class="page-title"><h2>لوحة أمين مجلس العمداء</h2></div>` + tabsHtml + body;
  }

  function renderAdminCases(){
    const rows = DATA.cases.map(c=>{
      const tally = tallyFor(c.id);
      return `<tr>
        <td>${esc(c.facultyName)}</td>
        <td>${esc(c.college)}</td>
        <td>${esc(c.currentRank)} ← ${esc(c.targetRank)}</td>
        <td><span class="status-pill ${c.status==='open'?'status-open':'status-closed'}">${c.status==='open'?'مفتوح':'مغلق'}</span></td>
        <td>${tally.accept} موافقة / ${tally.reject} رفض</td>
        <td>
          <div class="row-actions">
            <button class="icon-btn" data-action="toggle" data-id="${c.id}">${c.status==='open'?'إغلاق التصويت':'إعادة الفتح'}</button>
            <button class="icon-btn danger" data-action="delete-case" data-id="${c.id}">حذف</button>
          </div>
        </td>
      </tr>`;
    }).join("");

    return `
    <div class="panel">
      <h3>إضافة ترقية جديدة للتصويت</h3>
      <div class="add-form">
        <div class="field"><label>اسم عضو الهيئة التدريسية</label><input type="text" id="cFaculty" placeholder="مثال: د. أحمد الزعبي"></div>
        <div class="field"><label>الكلية</label><input type="text" id="cCollege" placeholder="مثال: كلية تكنولوجيا المعلومات"></div>
        <div class="field"><label>القسم</label><input type="text" id="cDept" placeholder="مثال: قسم علوم الحاسوب"></div>
        <div class="field"><label>الرتبة الحالية</label><input type="text" id="cCurrent" placeholder="أستاذ مساعد"></div>
        <div class="field"><label>الرتبة المطلوبة</label><input type="text" id="cTarget" placeholder="أستاذ مشارك"></div>
        <button class="btn-small" id="addCaseBtn">إضافة للتصويت</button>
      </div>
    </div>
    <div class="panel">
      <h3>الترقيات المطروحة (${DATA.cases.length})</h3>
      ${DATA.cases.length ? `
      <table>
        <thead><tr><th>عضو الهيئة التدريسية</th><th>الكلية</th><th>الترقية</th><th>الحالة</th><th>نتيجة التصويت الحالية</th><th>إجراءات</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>` : `<div class="empty">لم يتم إضافة أي ترقيات بعد.</div>`}
    </div>`;
  }

  function renderAdminMembers(){
    const rows = DATA.members.map(m=>`
      <tr>
        <td>${esc(m.name)}</td>
        <td>${esc(m.college)}</td>
        <td>${esc(m.pin)}</td>
        <td><div class="row-actions"><button class="icon-btn danger" data-action="delete-member" data-id="${m.id}">حذف</button></div></td>
      </tr>`).join("");

    return `
    <div class="panel">
      <h3>إضافة عضو إلى مجلس العمداء</h3>
      <div class="add-form">
        <div class="field"><label>الاسم / المسمى</label><input type="text" id="mName" placeholder="مثال: عميد كلية الشريعة"></div>
        <div class="field"><label>الكلية / الجهة</label><input type="text" id="mCollege" placeholder="مثال: كلية الشريعة"></div>
        <div class="field"><label>الرمز السري</label><input type="text" id="mPin" placeholder="رمز دخول رقمي"></div>
        <button class="btn-small" id="addMemberBtn">إضافة العضو</button>
      </div>
    </div>
    <div class="panel">
      <h3>أعضاء المجلس (${DATA.members.length})</h3>
      ${DATA.members.length ? `
      <table>
        <thead><tr><th>الاسم</th><th>الكلية</th><th>الرمز السري</th><th>إجراءات</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>` : `<div class="empty">لا يوجد أعضاء بعد.</div>`}
    </div>
    <div class="panel">
      <h3>إعدادات دخول المسؤول</h3>
      <div class="add-form">
        <div class="field"><label>تغيير رمز دخول المسؤول</label><input type="text" id="newAdminPin" placeholder="${esc(DATA.adminPin)}"></div>
        <button class="btn-small" id="saveAdminPinBtn">حفظ</button>
      </div>
    </div>`;
  }

  function tallyFor(caseId){
    const v = VOTES[caseId] || {};
    let accept=0, reject=0;
    Object.values(v).forEach(x=>{ if(x==='accept') accept++; else if(x==='reject') reject++; });
    return {accept, reject, total: DATA.members.length, voted: accept+reject};
  }

  function renderAdminResults(){
    if(DATA.cases.length === 0) return `<div class="empty">لا توجد ترقيات لعرض نتائجها.</div>`;
    const blocks = DATA.cases.map(c=>{
      const t = tallyFor(c.id);
      const pct = t.voted ? Math.round((t.accept/t.voted)*100) : 0;
      const notVoted = DATA.members.filter(m => !VOTES[c.id] || !VOTES[c.id][m.id]).map(m=>m.name);
      const decision = c.status==='closed'
        ? (t.accept > t.reject ? `<span class="status-pill status-open">قُبلت الترقية</span>` : `<span class="status-pill" style="background:var(--reject-bg); color:var(--reject);">لم تُقبل الترقية</span>`)
        : `<span class="status-pill status-closed">التصويت جارٍ</span>`;
      return `
      <div class="case-card no-print-margin">
        <div class="case-top">
          <div>
            <p class="case-name">${esc(c.facultyName)}</p>
            <div class="case-meta"><span>${esc(c.college)}</span><span>${esc(c.currentRank)} ← ${esc(c.targetRank)}</span></div>
          </div>
          ${decision}
        </div>
        <div class="result-bar"><div class="result-fill" style="width:${pct}%;"></div></div>
        <div class="result-nums">
          <span>موافقة: ${t.accept}</span>
          <span>عدم موافقة: ${t.reject}</span>
          <span>لم يصوّت: ${t.total - t.voted} من ${t.total}</span>
        </div>
        ${notVoted.length ? `<div class="not-voted">لم يصوّت بعد: ${notVoted.map(esc).join('، ')}</div>` : ``}
      </div>`;
    }).join("");
    return `
      <div class="page-title no-print"><div></div><button class="icon-btn" id="printBtn">طباعة التقرير</button></div>
      <div class="case-list">${blocks}</div>`;
  }

  function bindAdminEvents(){
    const addCaseBtn = document.getElementById("addCaseBtn");
    if(addCaseBtn) addCaseBtn.addEventListener("click", async ()=>{
      const facultyName = document.getElementById("cFaculty").value.trim();
      const college = document.getElementById("cCollege").value.trim();
      const department = document.getElementById("cDept").value.trim();
      const currentRank = document.getElementById("cCurrent").value.trim();
      const targetRank = document.getElementById("cTarget").value.trim();
      if(!facultyName || !college || !currentRank || !targetRank){
        showToast("يرجى تعبئة الحقول الأساسية على الأقل"); return;
      }
      DATA.cases.push({id: uid("c"), facultyName, college, department, currentRank, targetRank, status:"open"});
      await saveData();
      showToast("تمت إضافة الترقية للتصويت");
      render();
    });

    document.querySelectorAll('[data-action="toggle"]').forEach(b=>{
      b.addEventListener("click", async ()=>{
        const c = DATA.cases.find(x=>x.id===b.dataset.id);
        c.status = c.status === "open" ? "closed" : "open";
        await saveData();
        showToast(c.status === "closed" ? "تم إغلاق التصويت على هذه الترقية" : "تمت إعادة فتح التصويت");
        render();
      });
    });
    document.querySelectorAll('[data-action="delete-case"]').forEach(b=>{
      b.addEventListener("click", async ()=>{
        if(!confirm("هل أنت متأكد من حذف هذه الترقية؟ سيتم حذف نتائج التصويت المرتبطة بها.")) return;
        DATA.cases = DATA.cases.filter(x=>x.id!==b.dataset.id);
        delete VOTES[b.dataset.id];
        await saveData(); await saveVotes();
        showToast("تم الحذف");
        render();
      });
    });

    const addMemberBtn = document.getElementById("addMemberBtn");
    if(addMemberBtn) addMemberBtn.addEventListener("click", async ()=>{
      const name = document.getElementById("mName").value.trim();
      const college = document.getElementById("mCollege").value.trim();
      const pin = document.getElementById("mPin").value.trim();
      if(!name || !pin){ showToast("يرجى إدخال الاسم والرمز السري"); return; }
      DATA.members.push({id: uid("m"), name, college, pin});
      await saveData();
      showToast("تمت إضافة العضو");
      render();
    });
    document.querySelectorAll('[data-action="delete-member"]').forEach(b=>{
      b.addEventListener("click", async ()=>{
        if(!confirm("هل أنت متأكد من حذف هذا العضو؟")) return;
        DATA.members = DATA.members.filter(x=>x.id!==b.dataset.id);
        await saveData();
        showToast("تم حذف العضو");
        render();
      });
    });
    const saveAdminPinBtn = document.getElementById("saveAdminPinBtn");
    if(saveAdminPinBtn) saveAdminPinBtn.addEventListener("click", async ()=>{
      const val = document.getElementById("newAdminPin").value.trim();
      if(!val){ showToast("أدخل رمزاً جديداً"); return; }
      DATA.adminPin = val;
      await saveData();
      showToast("تم تحديث رمز المسؤول");
      render();
    });
    const printBtn = document.getElementById("printBtn");
    if(printBtn) printBtn.addEventListener("click", ()=> window.print());
  }

  /* ---------------- Boot ---------------- */
  loadAll().then(render);
})();
</script>
</body>
</html>
